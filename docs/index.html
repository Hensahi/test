<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="../responsive_web_design/dev_challenges/my-team-page-master/css/styles.css"
    />
    <title>The Crew</title>
  </head>
  <body>
    <!-- Primera seccion de la pagina Crew -->
    <main class="main">
      <section class="main-section">
        <h1 class="main__title">The creative crew</h1>
        <section class="main-section__us">
          <h2 class="main-section__us--title">Who are we?</h2>
          <p class="main-section__us--phar">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Perferendis
            error expedita deleniti quisquam dicta incidunt eaque facilis nemo?
            Blanditiis nulla.
          </p>
        </section>
      </section>

      <!-- Inicio primera galeria -->
      <div class="main__gallery--container">
        <div class="main__gallery main__gallery--1">
          <figure class="main__gallery--pics pic1">
            <img
              class="pic pic1"
              src="../responsive_web_design/dev_challenges/my-team-page-master/assets/images/photo1.png"
              alt="Bill Mahoney's photo"
            />
            <figcaption class="people-name">Bill Mahoney</figcaption>
          </figure>
          <p class="ocupation ocupation1">Product Owner</p>
          <figure class="main__gallery--pics pic2">
            <img
              class="pic pic2"
              src="../responsive_web_design/dev_challenges/my-team-page-master/assets/images/photo2.png"
              alt="Saba Cabrera's photo"
            />
            <figcaption class="people-name">Saba Cabrera</figcaption>
          </figure>
          <p class="ocupation ocupation2">Art Director</p>
          <figure class="main__gallery--pics pic3">
            <img
              class="pic pic3"
              src="../responsive_web_design/dev_challenges/my-team-page-master/assets/images/photo3.png"
              alt="Shae Le's photo"
            />
            <figcaption class="people-name">Shae Le</figcaption>
          </figure>
          <p class="ocupation ocupation3">Tech Lead</p>
        </div>

        <!-- Fin primera galeria -->

        <!-- Inicio segunda galeria -->

        <div class="main__gallery main__gallery--2">
          <figure class="main__gallery--pics pic4">
            <img
              class="pic"
              src="../responsive_web_design/dev_challenges/my-team-page-master/assets/images/photo4.png"
              alt="Skyla Lu's photo"
            />
            <figcaption class="people-name">Skyla Lu</figcaption>
          </figure>
          <p class="ocupation ocupation1">ux Designer</p>
          <figure class="main__gallery--pics pic5">
            <img
              class="pic"
              src="../responsive_web_design/dev_challenges/my-team-page-master/assets/images/photo5.png"
              alt="Griff Richards's photo"
            />
            <figcaption class="people-name">Griff Richards</figcaption>
          </figure>
          <p class="ocupation ocupation2">Developer</p>
          <figure class="main__gallery--pics pic6">
            <img
              class="pic"
              src="../responsive_web_design/dev_challenges/my-team-page-master/assets/images/photo6.png"
              alt="Stan John's photo"
            />
            <figcaption class="people-name">Stan John</figcaption>
          </figure>
          <p class="ocupation ocupation6">Developer</p>
        </div>

        <!-- Fin segunda galeria -->
      </div>
    </main>
  </body>
</html>
