<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Flexbox Practice</title>
  </head>
  <body>
    <header class="header">404 Not found</header>
    <main class="main">
      <section class="main__img">
        <figure class="main__img--container">
          <img
            src="https://images.unsplash.com/photo-1609743522653-52354461eb27?ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&ixlib=rb-1.2.1&auto=format&fit=crop&w=334&q=80"
          />
        </figure>
      </section>
      <section class="main__container">
        <section class="text">
          <h1 class="main__heading">
            I have bad news<span class="text-span"> for you </span>
          </h1>
          <p class="main__text">
            The page your are looking for might be<span class="text-span">
              removed or is temporarily unavailable.</span
            >
          </p>
        </section>
        <div class="btn">Soy un boton</div>
      </section>
    </main>
  </body>
</html>
